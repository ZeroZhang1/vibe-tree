<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Level Up Toast Preview</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #071008;
        --leaf: #5bbf7a;
        --paper: #fffaf0;
        font-family: "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        color: var(--ink);
        background:
          linear-gradient(135deg, rgba(255, 250, 240, 0.98), rgba(237, 247, 238, 0.96)),
          var(--paper);
      }

      main {
        width: min(520px, calc(100vw - 32px));
        display: grid;
        gap: 16px;
        justify-items: center;
      }

      .stage {
        position: relative;
        width: min(360px, 86vw);
        aspect-ratio: 1 / 1;
        display: grid;
        place-items: center;
        overflow: hidden;
        border: 1px solid rgba(42, 72, 48, 0.16);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(235, 246, 236, 0.78)),
          #fff4dd;
        box-shadow: 0 18px 46px rgba(47, 62, 43, 0.16);
      }

      .tree {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        padding: 34px;
        object-fit: contain;
        image-rendering: pixelated;
        pointer-events: none;
        animation: breathe 4.8s steps(3) infinite;
      }

      .level-badge,
      .level-up-toast {
        position: absolute;
        border: 2px solid var(--ink);
        border-radius: 6px;
        color: var(--ink);
        background: #fff3a3;
        box-shadow: 3px 3px 0 var(--ink);
        font-weight: 900;
        line-height: 1;
        pointer-events: none;
      }

      .level-badge {
        right: 16px;
        bottom: 16px;
        min-width: 46px;
        padding: 4px 7px;
        font-size: 0.72rem;
        text-align: center;
      }

      .level-up-toast {
        top: 12px;
        right: 12px;
        min-width: 92px;
        opacity: 0;
        padding: 7px 9px 6px;
        display: grid;
        gap: 4px;
        justify-items: end;
        background: linear-gradient(180deg, #fff3a3, #b9ff78);
        white-space: nowrap;
        transform: translateY(-10px) scale(0.92);
      }

      .level-up-toast strong {
        font-size: 0.78rem;
        font-weight: 1000;
      }

      .level-up-toast span {
        padding: 2px 5px;
        border: 1px solid rgba(7, 16, 8, 0.5);
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.58);
        font-size: 0.62rem;
        font-weight: 900;
      }

      .stage.play .level-up-toast {
        animation: levelToast 2s steps(6, end);
      }

      .stage.play .level-badge {
        animation: levelBadgeUp 1.6s steps(5, end);
      }

      button {
        min-height: 38px;
        padding: 0 16px;
        border: 1px solid rgba(42, 72, 48, 0.16);
        border-radius: 6px;
        color: var(--ink);
        background: var(--leaf);
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }

      @keyframes breathe {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.018);
        }
      }

      @keyframes levelBadgeUp {
        0% {
          transform: translateY(0) scale(1);
        }
        14% {
          transform: translateY(-7px) scale(1.18);
          background: #fff3a3;
        }
        32% {
          transform: translateY(-2px) scale(1.08);
          background: #b9ff78;
        }
        100% {
          transform: translateY(0) scale(1);
        }
      }

      @keyframes levelToast {
        0% {
          opacity: 0;
          transform: translateY(-10px) scale(0.92);
        }
        12% {
          opacity: 1;
          transform: translateY(0) scale(1.08);
        }
        26% {
          opacity: 1;
          transform: translateY(0) scale(0.99);
        }
        78% {
          opacity: 1;
          transform: translateY(-1px) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateY(-12px) scale(0.98);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="stage play" id="stage" aria-label="Level up animation preview">
        <img
          class="tree"
          src="../public/assets/trees/vibe-bonsai/pure-svg/03-young-layered-idle.svg"
          alt="tree"
          draggable="false"
        />
        <div class="level-up-toast" aria-hidden="true">
          <strong>LEVEL UP!</strong>
          <span>Lv.7 -> Lv.8</span>
        </div>
        <div class="level-badge">Lv.8</div>
      </section>
      <button id="replay" type="button">重播</button>
    </main>

    <script>
      const stage = document.querySelector("#stage");
      const replay = () => {
        stage.classList.remove("play");
        void stage.offsetWidth;
        stage.classList.add("play");
      };
      document.querySelector("#replay").addEventListener("click", replay);
      setInterval(replay, 3600);
    </script>
  </body>
</html>
