<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibe Tree</title>
    <script>
      (() => {
        try {
          const queryTheme = new URLSearchParams(location.search).get("uiTheme");
          const theme = queryTheme || localStorage.getItem("vibe-tree:ui-theme");
          document.documentElement.dataset.uiTheme =
            theme === "day" || theme === "soft" || theme === "night" ? theme : "night";
        } catch {
          document.documentElement.dataset.uiTheme = "night";
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/renderer/main.ts"></script>
  </body>
</html>
