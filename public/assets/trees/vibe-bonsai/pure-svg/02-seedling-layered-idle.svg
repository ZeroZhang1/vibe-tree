  <style>
    svg { overflow: visible; image-rendering: pixelated; shape-rendering: crispEdges; }
    .float { transform-origin: 48px 78px; animation: float-seedling 1.90s steps(2, end) infinite; }
    .leaves { transform-origin: 48px 45px; }
    .trunk { transform-origin: 48px 67px; }
    .shadow { transform-origin: 48px 84px; animation: shadow-seedling 1.90s steps(2, end) infinite; }
    @keyframes float-seedling {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1px); }
    }
    @keyframes leaves-seedling {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(1px); }
    }
    @keyframes trunk-seedling {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.992); }
    }
    @keyframes shadow-seedling {
      0%, 100% { opacity: 0.18; transform: scaleX(1); }
      50% { opacity: 0.12; transform: scaleX(0.94); }
    }
  </style>
