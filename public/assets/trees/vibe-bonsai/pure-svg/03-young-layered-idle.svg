      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1px); }
    }
    @keyframes leaves-young {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(1px); }
    }
    @keyframes trunk-young {
      0%, 100% { transform: scaleY(1); }
