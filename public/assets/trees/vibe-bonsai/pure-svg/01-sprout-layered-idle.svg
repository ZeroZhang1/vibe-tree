<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="vibe bonsai sprout idle animation">
  <style>
    svg { overflow: visible; image-rendering: pixelated; shape-rendering: crispEdges; }
    .float { transform-origin: 48px 78px; animation: float-sprout 1.70s steps(2, end) infinite; }
    .leaves { transform-origin: 48px 47px; }
    .trunk { transform-origin: 48px 66px; }
    .shadow { transform-origin: 48px 84px; animation: shadow-sprout 1.70s steps(2, end) infinite; }
    @keyframes float-sprout {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1px); }
    }
    @keyframes leaves-sprout {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(1px); }
    }
    @keyframes trunk-sprout {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.992); }
    }
    @keyframes shadow-sprout {
      0%, 100% { opacity: 0.18; transform: scaleX(1); }
      50% { opacity: 0.12; transform: scaleX(0.94); }
    }
  </style>
