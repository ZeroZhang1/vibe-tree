<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibe Tree Level Up Preview</title>
    <style>
      :root {
        --paper: #fffaf0;
        --ink: #162018;
        --leaf: #5bbf7a;
        font-family: "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 45%, rgba(91, 191, 122, 0.18), transparent 34%),
          linear-gradient(180deg, #fffaf0, #eef8eb);
        color: var(--ink);
      }

      .preview-wrap {
        display: grid;
        gap: 16px;
        justify-items: center;
      }

      .stage {
        position: relative;
        width: 360px;
        height: 360px;
        display: grid;
        place-items: center;
        overflow: hidden;
        border: 1px solid rgba(42, 72, 48, 0.16);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(235, 246, 236, 0.78)),
          var(--paper);
        box-shadow: 0 18px 46px rgba(47, 62, 43, 0.16);
      }

      .tree {
        width: 260px;
        height: 260px;
        object-fit: contain;
        image-rendering: pixelated;
      }

      .level-up-toast {
        position: absolute;
        top: 18px;
        right: 18px;
        z-index: 7;
        opacity: 0;
        min-width: 92px;
        padding: 7px 9px 6px;
        border: 2px solid #071008;
        border-radius: 6px;
        color: #071008;
        background: linear-gradient(180deg, #fff3a3, #b9ff78);
        box-shadow: 3px 3px 0 #071008;
        display: grid;
        gap: 4px;
        justify-items: end;
        line-height: 1.05;
        white-space: nowrap;
        transform: translateY(-10px) scale(0.92);
      }

      .level-up-toast strong {
        font-size: 0.78rem;
        font-weight: 1000;
      }

      .level-up-toast span {
        padding: 2px 5px;
        border: 1px solid rgba(7, 16, 8, 0.5);
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.58);
        font-size: 0.62rem;
        font-weight: 900;
      }

      .level-badge {
        position: absolute;
        right: 18px;
        bottom: 18px;
        z-index: 6;
        width: 62px;
        height: 26px;
        --badge-bg: #fff3a3;
        --badge-edge: #071008;
        border-radius: 6px;
        color: #071008;
        font-size: 0.72rem;
        font-weight: 900;
        line-height: 1;
        text-align: center;
      }

      .badge-face {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 3px 3px 4px;
        border: 2px solid var(--badge-edge);
        border-radius: 6px;
        background: var(--badge-bg);
        box-shadow: 3px 3px 0 var(--badge-edge);
        white-space: nowrap;
      }

      .stage.level-up .level-up-toast {
        animation: levelToast 2s steps(6, end);
      }

      .stage.level-up .level-badge {
        animation: levelBadgeUp 1.6s steps(5, end);
      }

      button {
        min-height: 38px;
        padding: 0 16px;
        border: 1px solid rgba(42, 72, 48, 0.16);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }

      @keyframes levelBadgeUp {
        0% {
          transform: translateY(0) scale(1);
        }
        14% {
          transform: translateY(-7px) scale(1.18);
          background: #fff3a3;
        }
        32% {
          transform: translateY(-2px) scale(1.08);
          background: #b9ff78;
        }
        100% {
          transform: translateY(0) scale(1);
        }
      }

      @keyframes levelToast {
        0% {
          opacity: 0;
          transform: translateY(-10px) scale(0.92);
        }
        12% {
          opacity: 1;
          transform: translateY(0) scale(1.08);
        }
        26% {
          opacity: 1;
          transform: translateY(0) scale(0.99);
        }
        78% {
          opacity: 1;
          transform: translateY(-1px) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateY(-12px) scale(0.98);
        }
      }
    </style>
  </head>
  <body>
    <main class="preview-wrap">
      <section class="stage level-up" id="stage">
        <img class="tree" src="../../public/assets/trees/vibe-bonsai/pure-svg/03-young-layered-idle.svg" alt="Vibe Tree" />
        <div class="level-up-toast" aria-hidden="true">
          <strong>LEVEL UP!</strong>
          <span>Lv.18 -> Lv.19</span>
        </div>
        <div class="level-badge">
          <span class="badge-face">Lv.19</span>
        </div>
      </section>
      <button id="replay" type="button">重新播放</button>
    </main>

    <script>
      const stage = document.querySelector("#stage");
      document.querySelector("#replay").addEventListener("click", () => {
        stage.classList.remove("level-up");
        void stage.offsetWidth;
        stage.classList.add("level-up");
      });

      setInterval(() => {
        stage.classList.remove("level-up");
        void stage.offsetWidth;
        stage.classList.add("level-up");
      }, 3000);
    </script>
  </body>
</html>
